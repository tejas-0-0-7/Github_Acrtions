name: CD Workflow

on:
  workflow_run:
    workflows: ["CI Workflow"]
    types:
      - completed

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:

      - name: Checkout code
        uses: actions/checkout@v4
      - name: Execute remote SSH using password
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.USER }}
          key: ${{ secrets.EC2_SSH_KEY}}
          script: |
            if [ ! -d ~/Github_Acrtions ]; then
              git clone https://github.com/tejas-0-0-7/Github_Acrtions.git ~/Github_Acrtions
            fi
            cd ~/Github_Acrtions
            git pull origin main
            if [ ! -f .env ]; then
              echo "ERROR: ~/Github_Acrtions/.env is missing. Create it once with DOCKERHUB_USERNAME and DB credentials."
              exit 1
            fi
            docker compose build frontend
            docker compose pull
            docker compose up -d
            docker image prune -f