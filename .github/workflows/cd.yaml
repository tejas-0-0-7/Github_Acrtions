name: CD Workflow

on:
  workflow_run:
    workflows: ["CI Workflow"]
    types:
      - completed

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:

      - name: Checkout code
        uses: actions/checkout@v4
      - name: Execute remote SSH using password
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.USER }}
          key: ${{ secrets.EC2_SSH_KEY}}
          script: |
            if [ ! -d ~/skillpulse ]; then
              git clone ${{ github.server_url }}/${{ github.repository }}.git ~/skillpulse
            fi
            cd ~/skillpulse
            git pull origin main
            if [ ! -f .env ]; then
              echo "ERROR: ~/skillpulse/.env is missing. Create it once with DOCKERHUB_USERNAME and DB credentials."
              exit 1
            fi
            docker compose pull
            docker compose up -d
            docker image prune -f